apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: ui
  name: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ui
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: ui
    spec:
      containers:
        - env:
            - name: JAVA_OPTS
              value: -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/urandom
            - name: RETAIL_UI_ENDPOINTS_CARTS
              value: http://carts:8080
            - name: RETAIL_UI_ENDPOINTS_CATALOG
              value: http://catalog:8080
            - name: RETAIL_UI_ENDPOINTS_CHECKOUT
              value: http://checkout:8080
            - name: RETAIL_UI_ENDPOINTS_ORDERS
              value: http://orders:8080
            - name: SERVER_TOMCAT_ACCESSLOG_ENABLED
              value: "true"
          image: public.ecr.aws/aws-containers/retail-store-sample-ui:1.3.0
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -s -f http://localhost:8080/actuator/health || exit 1
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 10
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -s -f http://localhost:8080/actuator/health || exit 1
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 10
          name: ui
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: 256Mi
              cpu: 125m
            limits:
              memory: 512Mi
              cpu: 500m
          securityContext:
            capabilities:
              drop:
                - ALL
      hostname: ui
      restartPolicy: Always
