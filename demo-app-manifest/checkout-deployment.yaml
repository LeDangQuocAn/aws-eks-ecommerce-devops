apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: checkout
  name: checkout
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: checkout
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: checkout
    spec:
      containers:
        - env:
            - name: RETAIL_CHECKOUT_ENDPOINTS_ORDERS
              value: http://orders:8080
            - name: RETAIL_CHECKOUT_PERSISTENCE_PROVIDER
              value: redis
            - name: RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL
              value: redis://checkout-redis:6379
          image: public.ecr.aws/aws-containers/retail-store-sample-checkout:1.3.0
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -f http://localhost:8080/health || exit 1
            failureThreshold: 5
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 10
          name: checkout
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
          securityContext:
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - all
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: checkout-tmpfs0
      hostname: checkout
      restartPolicy: Always
      volumes:
        - emptyDir:
            medium: Memory
          name: checkout-tmpfs0
