apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: catalog
  name: catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: catalog
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: catalog
    spec:
      containers:
        - env:
            - name: GIN_MODE
              value: release
            - name: RETAIL_CATALOG_PERSISTENCE_ENDPOINT
              value: catalog-db:3306
            - name: RETAIL_CATALOG_PERSISTENCE_PASSWORD
              value: "password"
            - name: RETAIL_CATALOG_PERSISTENCE_PROVIDER
              value: mysql
          image: public.ecr.aws/aws-containers/retail-store-sample-catalog:1.3.0
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -f http://localhost:8080/health || exit 1
            failureThreshold: 5
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 10
          name: catalog
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          securityContext:
            capabilities:
              drop:
                - all
      hostname: catalog
      restartPolicy: Always
