apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: orders
  name: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: orders
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: orders
    spec:
      containers:
        - env:
            - name: RETAIL_ORDERS_MESSAGING_PROVIDER
              value: rabbitmq
            - name: RETAIL_ORDERS_MESSAGING_RABBITMQ_ADDRESSES
              value: rabbitmq:5672
            - name: RETAIL_ORDERS_MESSAGING_RABBITMQ_PASSWORD
              value: "password"
            - name: RETAIL_ORDERS_MESSAGING_RABBITMQ_USERNAME
              value: rabbitmq
            - name: RETAIL_ORDERS_PERSISTENCE_ENDPOINT
              value: orders-db:5432
            - name: RETAIL_ORDERS_PERSISTENCE_NAME
              value: orders
            - name: RETAIL_ORDERS_PERSISTENCE_PASSWORD
              value: "password"
            - name: RETAIL_ORDERS_PERSISTENCE_PROVIDER
              value: postgres
            - name: RETAIL_ORDERS_PERSISTENCE_USERNAME
              value: orders_user
            - name: SERVER_TOMCAT_ACCESSLOG_ENABLED
              value: "true"
          image: public.ecr.aws/aws-containers/retail-store-sample-orders:1.3.0
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -f http://localhost:8080/actuator/health || exit 1
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -f http://localhost:8080/actuator/health || exit 1
            failureThreshold: 3
            periodSeconds: 5
            timeoutSeconds: 5
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -f http://localhost:8080/actuator/health || exit 1
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 10
          name: orders
          resources:
            requests:
              memory: 256Mi
              cpu: 125m
            limits:
              memory: 512Mi
              cpu: 500m
          securityContext:
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - all
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: orders-tmpfs0
      hostname: orders
      restartPolicy: Always
      volumes:
        - emptyDir:
            medium: Memory
          name: orders-tmpfs0
