name: E2E Test

on:
  push:
    branches:
      - "feat/*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  docker:
    name: Docker E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Setup Env"
        uses: ./.github/actions/setup-env
      - name: Compose up
        run: |
          set -euo pipefail
          DB_PASSWORD='test123' yarn nx compose:up ui
      - name: Debug docker on failure
        if: failure()
        run: |
          DB_PASSWORD='test123' docker compose -f src/app/docker-compose.yml ps
          DB_PASSWORD='test123' docker compose -f src/app/docker-compose.yml logs --no-color --tail=300 checkout 2>&1 || true
      - name: Test
        run: |
          CYPRESS_BASE_URL='http://localhost:8888' yarn nx execute e2e
      - name: Compose down
        run: |
          DB_PASSWORD='test123' yarn nx compose:down ui

  docker-multi:
    name: Docker E2E Tests (Multi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Setup Env"
        uses: ./.github/actions/setup-env
      - name: Compose up
        run: |
          set -euo pipefail
          DB_PASSWORD='test123' yarn nx compose:up
      - name: Debug docker on failure
        if: failure()
        run: |
          DB_PASSWORD='test123' docker compose -f src/app/docker-compose.yml ps
          DB_PASSWORD='test123' docker compose -f src/app/docker-compose.yml logs --no-color --tail=300 checkout 2>&1 || true
      - name: Test
        run: |
          CYPRESS_BASE_URL='http://localhost:8888' yarn nx execute e2e
      - name: Load Generator
        run: |
          cd src/load-generator
          bash scripts/run-test.sh
      - name: Compose down
        run: |
          DB_PASSWORD='test123' yarn nx compose:down
