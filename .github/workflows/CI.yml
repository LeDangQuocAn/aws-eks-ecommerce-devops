name: CI

on:
  push:
    # Real image build and publish flow when changes land on main.
    branches:
      - "feat/cicd-pipeline"
  workflow_dispatch:
    inputs:
      version:
        description: "Version, tag, or SHA"
        required: false
        default: ""

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate
    uses: ./.github/workflows/validate.yml

  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Resolve version
        id: vars
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      changed_services_matrix: ${{ steps.set-matrix.outputs.changed_services_matrix }}
      any_service_changed: ${{ steps.set-matrix.outputs.any_service_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Filter changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cart:
              - 'src/cart/**'
            catalog:
              - 'src/catalog/**'
            checkout:
              - 'src/checkout/**'
            orders:
              - 'src/orders/**'
            ui:
              - 'src/ui/**'
            load-generator:
              - 'src/load-generator/**'
            shared:
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'nx.json'
              - 'package.json'
              - 'yarn.lock'
              - 'src/app/**'
      - name: Build changed-service matrix
        id: set-matrix
        run: |
          set -euo pipefail

          full_services=(
            cart
            catalog
            checkout
            orders
            ui
            load-generator
          )

          changed_services=()

          if [[ "${{ steps.changes.outputs.shared }}" == "true" ]]; then
            changed_services=("${full_services[@]}")
          else
            [[ "${{ steps.changes.outputs.cart }}" == "true" ]] && changed_services+=("cart")
            [[ "${{ steps.changes.outputs.catalog }}" == "true" ]] && changed_services+=("catalog")
            [[ "${{ steps.changes.outputs.checkout }}" == "true" ]] && changed_services+=("checkout")
            [[ "${{ steps.changes.outputs.orders }}" == "true" ]] && changed_services+=("orders")
            [[ "${{ steps.changes.outputs.ui }}" == "true" ]] && changed_services+=("ui")
            [[ "${{ steps.changes.outputs.load-generator }}" == "true" ]] && changed_services+=("load-generator")
          fi

          if [[ ${#changed_services[@]} -eq 0 ]]; then
            echo "changed_services_matrix=[]" >> "$GITHUB_OUTPUT"
            echo "any_service_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          matrix_json="$(printf '%s\n' "${changed_services[@]}" | jq -R . | jq -sc .)"
          echo "changed_services_matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "any_service_changed=true" >> "$GITHUB_OUTPUT"

  build:
    name: Build Images
    needs:
      - validate
      - resolve-version
      - detect-changes
    if: needs.detect-changes.outputs.any_service_changed == 'true'
    uses: ./.github/workflows/r-build-scan-push.yml
    with:
      services_matrix: ${{ needs.detect-changes.outputs.changed_services_matrix }}
      version: ${{ needs.resolve-version.outputs.version }}
      target_arch: amd64
      aws_region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
      aws_ecr_repository: ${{ vars.AWS_ECR_REPOSITORY }}
    secrets: inherit

  publish:
    name: Publish
    needs:
      - build
      - resolve-version
      - detect-changes
    if: needs.detect-changes.outputs.any_service_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-version.outputs.version }}
      - name: "Setup Env"
        uses: ./.github/actions/setup-env
      - name: "Get AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
          role-session-name: GithubActionsSession

      - name: "Login to Amazon ECR Private"
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push manifests and helm charts
        env:
          TAG_NAME: ${{ needs.resolve-version.outputs.version }}
          AWS_ECR_REPOSITORY: ${{ vars.AWS_ECR_REPOSITORY }}
        run: |
          export IMAGE_TAG=${TAG_NAME#v}

          yarn nx run-many -t manifest --projects=tag:service --args="--repository=${AWS_ECR_REPOSITORY}/ecommerce/{projectName},--tag=${IMAGE_TAG}"
          yarn nx manifest load-generator --args="--repository=${AWS_ECR_REPOSITORY}/ecommerce/load-generator,--tag=load-gen.${IMAGE_TAG}"

          yarn nx run-many -t helm --projects=tag:service --remote oci://${AWS_ECR_REPOSITORY} --push
