name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version, tag, or SHA"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-to-environment.yml
    with:
      version: ${{ inputs.version || github.sha }}
    secrets: inherit
